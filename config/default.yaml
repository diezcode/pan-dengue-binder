project:
  name: pan-dengue-binder
  scope: computational_non_infectious_research
  claim_policy: research_hypotheses_only

paths:
  raw_data: data/raw
  processed_data: data/processed
  outputs: outputs
  reports: reports
  structures: data/raw/structures
  sequences: data/raw/sequences
  processed_sequences: data/processed/sequences
  processed_alignments: data/processed/alignments

data_sources:
  uniprot_reference_polyproteins:
    DENV-1: P33478
    DENV-2: P29990
    DENV-3: P27915
    DENV-4: P09866
  rcsb_structures:
    seed_structure: 1OAN

pipeline:
  dry_run_default: true
  minimum_sequences_per_serotype: 1
  run_metadata_filename: run_metadata.json

sequence_data:
  include_uniprot_references: true
  local_fasta: ""
  local_bulk_fasta: ""
  local_curated_fasta: ""
  local_manifest: ""
  cache_subdir: uniprot
  polyprotein_output: denv_polyproteins.fasta
  e_protein_output: denv_e_proteins.fasta
  manifest_output: sequence_manifest.tsv
  summary_output: sequence_summary.json
  e_protein:
    start_1_based: 281
    end_1_based_inclusive: 775
  validation:
    min_e_protein_length: 400
    max_e_protein_length: 600

alignment:
  method: auto
  output_fasta: denv_e_proteins.aligned.fasta
  conservation_output: conservation.tsv
  conservation_by_serotype_output: conservation_by_serotype.tsv
  summary_output: alignment_summary.json
  reference_serotype: DENV-1
  reference_sequence_id: ""
  python_fallback_max_records: 100

target_atlas:
  structure_mapping_input: structure_mapping.tsv
  candidates_output: epitope_candidates.tsv
  ranked_output: ranked_epitopes.json
  report_output: target_atlas.md
  min_support_count: 1
  max_entropy: 0.35
  max_gap_fraction: 0.10
  min_consensus_frequency: 0.85
  min_patch_size: 3
  max_patch_gap: 3
  structure_cluster_distance_angstrom: 12.0
  missing_structure_score: 0.20
  unmapped_structure_score: 0.15
  min_advance_score: 0.65
  min_structure_score_for_advance: 0.55
  require_structure_for_advance: true
  advance_min: 2
  advance_max: 4
  fusion_loop_start: 98
  fusion_loop_end: 112
  domain_iii_start: 295
  domain_iii_end: 395
  stem_start: 396
  weights:
    conservation: 0.35
    structure: 0.20
    functional_literature: 0.15
    ade_context: 0.10
    designability: 0.10
    template: 0.10

external_tools:
  mafft:
    executable: mafft
  clustal_omega:
    executable: clustalo
  rfdiffusion:
    run_inference_script: ""
  proteinmpnn:
    parse_multiple_chains_script: ""
    protein_mpnn_script: ""
  colabfold:
    executable: colabfold_batch

design_defaults:
  binder_length: 65
  num_designs: 10
  target_chain: A
  output_prefix: outputs/rfdiffusion/design

safety:
  repository_boundary: computational_analysis_only
  exclude_infectious_methods: true
  exclude_clinical_claims: true
  require_qualified_review_before_experiments: true
